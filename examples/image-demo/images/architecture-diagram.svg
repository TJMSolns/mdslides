<svg width="500" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Three-layer architecture diagram -->
  <defs>
    <style>
      .box { fill: #F5F5F5; stroke: #002C74; stroke-width: 2; }
      .text { font-family: Arial, sans-serif; font-size: 16px; fill: #002C74; text-anchor: middle; }
      .label { font-family: Arial, sans-serif; font-size: 14px; fill: #6C757D; text-anchor: middle; }
    </style>
  </defs>

  <!-- Presentation Layer -->
  <rect class="box" x="50" y="20" width="400" height="60" rx="5"/>
  <text class="text" x="250" y="45">Presentation Layer</text>
  <text class="label" x="250" y="65">HTML Renderer, CLI</text>

  <!-- Domain Layer -->
  <rect class="box" x="50" y="100" width="400" height="60" rx="5"/>
  <text class="text" x="250" y="125">Domain Layer</text>
  <text class="label" x="250" y="145">Slide, SlideDeck, Theme</text>

  <!-- Infrastructure Layer -->
  <rect class="box" x="50" y="180" width="400" height="60" rx="5"/>
  <text class="text" x="250" y="205">Infrastructure Layer</text>
  <text class="label" x="250" y="225">Markdown Parser, Flexmark Adapter</text>

  <!-- Arrows -->
  <path d="M 250 80 L 250 100" stroke="#0B9655" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 250 160 L 250 180" stroke="#0B9655" stroke-width="2" marker-end="url(#arrowhead)"/>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#0B9655"/>
    </marker>
  </defs>
</svg>
