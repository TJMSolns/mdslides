<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="600" height="300" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="300" y="30" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle" fill="#2c3e50">
    MDSlides Architecture
  </text>

  <!-- Domain Layer Box -->
  <rect x="50" y="60" width="150" height="200" fill="#3498db" stroke="#2c3e50" stroke-width="2" rx="5"/>
  <text x="125" y="85" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="white">
    Domain
  </text>
  <text x="125" y="110" font-family="Arial" font-size="12" text-anchor="middle" fill="white">
    • SlideDeck
  </text>
  <text x="125" y="130" font-family="Arial" font-size="12" text-anchor="middle" fill="white">
    • Slide
  </text>
  <text x="125" y="150" font-family="Arial" font-size="12" text-anchor="middle" fill="white">
    • Theme
  </text>
  <text x="125" y="170" font-family="Arial" font-size="12" text-anchor="middle" fill="white">
    • Validation
  </text>

  <!-- Infrastructure Layer Box -->
  <rect x="225" y="60" width="150" height="200" fill="#e74c3c" stroke="#2c3e50" stroke-width="2" rx="5"/>
  <text x="300" y="85" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="white">
    Infrastructure
  </text>
  <text x="300" y="110" font-family="Arial" font-size="12" text-anchor="middle" fill="white">
    • Parser
  </text>
  <text x="300" y="130" font-family="Arial" font-size="12" text-anchor="middle" fill="white">
    • Renderer
  </text>
  <text x="300" y="150" font-family="Arial" font-size="12" text-anchor="middle" fill="white">
    • ThemeLoader
  </text>
  <text x="300" y="170" font-family="Arial" font-size="12" text-anchor="middle" fill="white">
    • ImageCopier
  </text>

  <!-- CLI Layer Box -->
  <rect x="400" y="60" width="150" height="200" fill="#2ecc71" stroke="#2c3e50" stroke-width="2" rx="5"/>
  <text x="475" y="85" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="white">
    CLI
  </text>
  <text x="475" y="110" font-family="Arial" font-size="12" text-anchor="middle" fill="white">
    • Main
  </text>
  <text x="475" y="130" font-family="Arial" font-size="12" text-anchor="middle" fill="white">
    • Args Parser
  </text>
  <text x="475" y="150" font-family="Arial" font-size="12" text-anchor="middle" fill="white">
    • IO Effects
  </text>

  <!-- Arrows -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2c3e50"/>
    </marker>
  </defs>

  <line x1="200" y1="160" x2="225" y2="160" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="375" y1="160" x2="400" y2="160" stroke="#2c3e50" stroke-width="2" marker-end="url(#arrowhead)"/>
</svg>
