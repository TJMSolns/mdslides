id: content
name: Content Slide
description: Standard content slide with heading and body text for general information presentation
slots:
  - name: heading
    type: markdown_inline
    required: true
    constraints:
      heading_level: 2
      max_lines: 1
      max_chars: 80
    description: Slide heading (H2 level)
  - name: body
    type: markdown_block
    required: true
    constraints:
      max_lines: 12
      max_words: 150
      allowed_elements:
        - paragraph
        - bullet_list
        - numbered_list
        - blockquote
        - inline_code
        - emphasis
        - strong
        - link
      disallowed_elements:
        - code_block
        - image
        - heading
      max_list_depth: 2
    description: Main content body with markdown formatting
metadata:
  version: 1.0.0
  author: Tony Moores, TJM Solutions
  created: 2024-12-19
  use_cases:
    - General information slides
    - Key takeaways
    - Bullet point lists
    - Explanatory content
  notes: |
    This is the workhorse template for most presentation content (80% of slides).
    Use specialized templates for images (image.yaml) or code (code.yaml).
    Multiple headings require multiple slides - use slide separator (---).
